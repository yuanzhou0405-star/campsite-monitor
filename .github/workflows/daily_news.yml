name: Daily News

on:
  schedule:
    - cron: '0 11 * * *'  # 7 AM EDT (UTC-4)
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch news and send to Lark
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, urllib.parse, datetime, xml.etree.ElementTree as ET, os, re

          TODAY = datetime.date.today().strftime("%Y-%m-%d")
          WEBHOOK = os.environ["LARK_WEBHOOK"]

          RSS_SOURCES = {
              "💼 TECH": [
                  "https://feeds.feedburner.com/TechCrunch",
                  "https://www.theverge.com/rss/index.xml",
              ],
              "💼 OPERATIONS": [
                  "https://hbr.org/resources/rss/hbr-topic-rss.xml?topic=managing-people",
                  "https://feeds.feedburner.com/entrepreneur/latest",
              ],
              "🛂 IMMIGRATION": [
                  "https://www.uscis.gov/news/rss",
                  "https://immigrationimpact.com/feed/",
              ],
              "🏥 HEALTH": [
                  "https://www.healthline.com/rss/health-news",
              ],
              "🇺🇸 US NEWS": [
                  "https://feeds.npr.org/1001/rss.xml",
                  "https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml",
              ],
              "💰 FINANCE": [
                  "https://feeds.bloomberg.com/markets/news.rss",
                  "https://www.wsj.com/xml/rss/3_7085.xml",
              ],
              "🌍 WORLD": [
                  "http://feeds.bbci.co.uk/news/world/rss.xml",
              ],
          }

          # How many articles per category
          CATEGORY_COUNTS = {
              "💼 TECH": 2,
              "💼 OPERATIONS": 1,
              "🛂 IMMIGRATION": 2,
              "🏥 HEALTH": 1,
              "🇺🇸 US NEWS": 2,
              "💰 FINANCE": 1,
              "🌍 WORLD": 1,
          }

          def fetch_rss(url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return r.read()
              except:
                  return None

          def parse_rss(xml_data):
              items = []
              try:
                  root = ET.fromstring(xml_data)
                  ns = {"atom": "http://www.w3.org/2005/Atom"}
                  # RSS 2.0
                  for item in root.findall(".//item")[:3]:
                      title = item.findtext("title", "").strip()
                      link = item.findtext("link", "").strip()
                      if title and link:
                          items.append({"title": title, "link": link})
                  # Atom
                  if not items:
                      for entry in root.findall(".//{http://www.w3.org/2005/Atom}entry")[:3]:
                          title = entry.findtext("{http://www.w3.org/2005/Atom}title", "").strip()
                          link_el = entry.find("{http://www.w3.org/2005/Atom}link")
                          link = link_el.get("href", "") if link_el is not None else ""
                          if title and link:
                              items.append({"title": title, "link": link})
              except:
                  pass
              return items

          def clean(text):
              return re.sub(r'<[^>]+>', '', text).strip()

          # Fetch all articles
          all_articles = {}
          for category, urls in RSS_SOURCES.items():
              articles = []
              for url in urls:
                  data = fetch_rss(url)
                  if data:
                      articles.extend(parse_rss(data))
                  if len(articles) >= CATEGORY_COUNTS[category]:
                      break
              all_articles[category] = articles[:CATEGORY_COUNTS[category]]

          # Build Lark card
          elements = []

          elements.append({
              "tag": "div",
              "text": {
                  "tag": "lark_md",
                  "content": f"每天10条精选 · 英语+资讯双丰收 · 点标题看原文"
              }
          })
          elements.append({"tag": "hr"})

          total = 0
          for category, articles in all_articles.items():
              if not articles:
                  continue
              for article in articles:
                  total += 1
                  title = clean(article["title"])
                  link = article["link"]
                  elements.append({
                      "tag": "div",
                      "text": {
                          "tag": "lark_md",
                          "content": f"**{total}. {category}**\n[📌 {title}]({link})"
                      }
                  })
                  elements.append({"tag": "hr"})

          elements.append({
              "tag": "note",
              "elements": [{"tag": "plain_text", "content": f"📡 RSS实时抓取 | {TODAY} 更新"}]
          })

          card = {
              "msg_type": "interactive",
              "card": {
                  "header": {
                      "title": {"tag": "plain_text", "content": f"🗞️ 每日资讯 {TODAY}"},
                      "template": "blue"
                  },
                  "elements": elements
              }
          }

          data = json.dumps(card).encode()
          req = urllib.request.Request(
              WEBHOOK,
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST"
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read().decode())
              print(f"Lark response: {result}")
          EOF
