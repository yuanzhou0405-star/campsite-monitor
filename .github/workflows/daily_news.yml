name: Daily News

on:
  schedule:
    - cron: '0 11 * * *'  # 7 AM EDT (UTC-4)
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch news and send to Lark
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, urllib.parse, datetime, xml.etree.ElementTree as ET, os, re

          TODAY = datetime.date.today().strftime("%Y-%m-%d")
          WEBHOOK = os.environ["LARK_WEBHOOK"]

          RSS_SOURCES = {
              "💼 TECH": [
                  "https://techcrunch.com/feed/",
                  "https://feeds.arstechnica.com/arstechnica/index",
                  "https://www.wired.com/feed/rss",
              ],
              "💼 OPERATIONS": [
                  "https://www.inc.com/rss",
              ],
              "🛂 IMMIGRATION": [
                  "https://immigrationimpact.com/feed/",
              ],
              "🏥 HEALTH": [
                  "https://www.healthline.com/rss/health-news",
              ],
              "🇺🇸 US NEWS": [
                  "https://feeds.npr.org/1001/rss.xml",
              ],
              "💰 FINANCE": [
                  "https://feeds.bloomberg.com/markets/news.rss",
                  "https://www.cnbc.com/id/100003114/device/rss/rss.html",
              ],
              "🌍 WORLD": [
                  "http://feeds.bbci.co.uk/news/world/rss.xml",
              ],
          }

          CATEGORY_COUNTS = {
              "💼 TECH": 2,
              "💼 OPERATIONS": 1,
              "🛂 IMMIGRATION": 2,
              "🏥 HEALTH": 1,
              "🇺🇸 US NEWS": 2,
              "💰 FINANCE": 1,
              "🌍 WORLD": 1,
          }

          def fetch_rss(url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return r.read()
              except:
                  return None

          def parse_rss(xml_data):
              items = []
              try:
                  root = ET.fromstring(xml_data)
                  for item in root.findall(".//item")[:3]:
                      title = (item.findtext("title") or "").strip()
                      link = (item.findtext("link") or "").strip()
                      desc = (item.findtext("description") or "").strip()
                      desc = re.sub(r'<[^>]+>', '', desc)[:200]
                      if title and link:
                          items.append({"title": title, "link": link, "desc": desc})
                  if not items:
                      for entry in root.findall(".//{http://www.w3.org/2005/Atom}entry")[:3]:
                          title = (entry.findtext("{http://www.w3.org/2005/Atom}title") or "").strip()
                          link_el = entry.find("{http://www.w3.org/2005/Atom}link")
                          link = link_el.get("href", "") if link_el is not None else ""
                          summary = entry.find("{http://www.w3.org/2005/Atom}summary")
                          desc = re.sub(r'<[^>]+>', '', (summary.text or "") if summary is not None else "")[:200]
                          if title and link:
                              items.append({"title": title, "link": link, "desc": desc})
              except:
                  pass
              return items

          def translate(text):
              if not text.strip():
                  return ""
              try:
                  text = text[:300]
                  url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=" + urllib.parse.quote(text)
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=8) as r:
                      data = json.loads(r.read().decode())
                      return "".join(part[0] for part in data[0] if part[0])
              except:
                  return ""

          def clean(text):
              return re.sub(r'<[^>]+>', '', text).strip()

          # Fetch all articles
          all_articles = {}
          for category, urls in RSS_SOURCES.items():
              articles = []
              for url in urls:
                  data = fetch_rss(url)
                  if data:
                      articles.extend(parse_rss(data))
                  if len(articles) >= CATEGORY_COUNTS[category]:
                      break
              all_articles[category] = articles[:CATEGORY_COUNTS[category]]

          # Build Lark card
          elements = []
          elements.append({
              "tag": "div",
              "text": {"tag": "lark_md", "content": "每天10条精选 · 中英对照 · **点标题跳转原文**"}
          })
          elements.append({"tag": "hr"})

          total = 0
          for category, articles in all_articles.items():
              for article in articles:
                  total += 1
                  title_en = clean(article["title"])
                  title_cn = translate(title_en)
                  desc_en = clean(article["desc"])
                  desc_cn = translate(desc_en) if desc_en else ""
                  link = article["link"]

                  content = f"**{total}. {category}**\n"
                  content += f"[📌 {title_en}]({link})\n"
                  if title_cn:
                      content += f"　　{title_cn}\n"
                  if desc_en:
                      content += f"\n💬 {desc_en}\n"
                  if desc_cn:
                      content += f"　　{desc_cn}"

                  elements.append({"tag": "div", "text": {"tag": "lark_md", "content": content}})
                  elements.append({"tag": "hr"})

          elements.append({
              "tag": "note",
              "elements": [{"tag": "plain_text", "content": f"📡 RSS实时抓取 + Google翻译 | {TODAY} | 共{total}条"}]
          })

          card = {
              "msg_type": "interactive",
              "card": {
                  "header": {
                      "title": {"tag": "plain_text", "content": f"🗞️ 每日资讯 {TODAY}"},
                      "template": "blue"
                  },
                  "elements": elements
              }
          }

          data = json.dumps(card).encode()
          req = urllib.request.Request(WEBHOOK, data=data, headers={"Content-Type": "application/json"}, method="POST")
          with urllib.request.urlopen(req) as resp:
              print(f"Lark: {resp.read().decode()}")
          EOF
